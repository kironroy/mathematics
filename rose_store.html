<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rose Store Matrix Calculator</title>
    <!-- Include math.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/9.4.4/math.js"></script>
</head>

<body>
    <div id="rose-store-container">
        <h1>Rose Store Sales Calculator</h1>

        <div id="price-info">
            <h2>Price Information</h2>
            <ul>
                <li>Red Rose: $3</li>
                <li>White Rose: $4</li>
                <li>Yellow Rose: $2</li>
            </ul>
        </div>

        <div id="sales-data">
            <h2>Sales Data</h2>
            <div id="roses"></div>
            <div id="roses-flat"></div>

            <h3>Daily Sales Breakdown</h3>
            <div id="mon-sales"></div>
            <div id="tue-sales"></div>
            <div id="wed-sales"></div>

            <h3>Summary</h3>
            <div id="total-sales"></div>
        </div>
    </div>

    <!-- Include your TypeScript compiled to JavaScript -->
    <script src="roseStore.js"></script>
</body>

</html>
